<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deoba's Game</title>
<link rel="stylesheet" href="index1.css">
<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body>

<h1>Deoba Says</h1>
<h3 id="score">Score: 0</h3>
<h3 id="high-score">High Score: 0</h3>
<h2 id="level-title">Press Start</h2> 
<h3 id="timer">Time: 0</h3>


<div class="btn">
<button id="start-btn">Start Game</button>  
<a href="index2.html">
<button class="switch-btn" id="myBtn">Switch mode</button>
</a>  <!--- <a href="index2.html" class="switch-btn"><button>Switch mode</button></a> -->
</div>



<div class="page-wrapper">
  <div class="box" style="background-color:red;" id="box1"></div>
  <div class="box" style="background-color:blue;" id="box2"></div>
</div>

<div class="page-wrapper2">
  <div class="box" style="background-color:green;" id="box3"></div>
  <div class="box" style="background-color:yellow;" id="box4"></div>
</div>

<script>

let gamePattern = [];
let userClickedPattern = [];

let buttonColors = ["box1", "box2", "box3", "box4"];

let started = false;
let level = 0;
let score = 0;
let highScore = 0;

const boxes = document.querySelectorAll(".box");

// AUDIO
let audioContext = new (window.AudioContext || window.webkitAudioContext)();

document.addEventListener("click", () => {
  if (audioContext.state === "suspended") {
    audioContext.resume();
  }
});

// START BUTTON
document.getElementById("start-btn").addEventListener("click", function () {
  if (!started) {
    started = true;
    nextSequence();
  }
});

// BOX CLICK
boxes.forEach(box => {
  box.addEventListener("click", function () {

    if (!started) return;

    let userChosenColor = this.id;

    userClickedPattern.push(userChosenColor);

    playSound(userChosenColor);
    flashBox(this);
    checkAnswer(userClickedPattern.length - 1);
  });
});

//Timer function
let timeLeft = 0;
let timerId;

function startTimer() {

  // decide time based on level
  if (level <= 5) {
    timeLeft = 12;
  } 
  else if (level <= 10) {
    timeLeft = 9;
  } 
  else {
    timeLeft = 5;
  }

  document.getElementById("timer").innerText = "Time: " + timeLeft;

  clearInterval(timerId); // stop previous timer if any

  timerId = setInterval(() => {
    timeLeft--;

    document.getElementById("timer").innerText = "Time: " + timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timerId);
      gameOver();
    }
  }, 1000);
}

// NEXT SEQUENCE
function nextSequence() {

  userClickedPattern = [];

  level++;
  score++;

  document.getElementById("level-title").innerText = "Level " + level;
  document.getElementById("score").innerText = "Score: " + score;

  const randomIndex = Math.floor(Math.random() * 4);
  const randomColor = buttonColors[randomIndex];

  gamePattern.push(randomColor);

  playSound(randomColor);

  setTimeout(() => {
    flashBox(document.getElementById(randomColor));
  }, 500);

  startTimer();
}

// FLASH
function flashBox(box) {
  box.classList.add("flash");

  setTimeout(() => {
    box.classList.remove("flash");
  }, 300);
}

// CHECK ANSWER
function checkAnswer(currentIndex) {

  if (userClickedPattern[currentIndex] === gamePattern[currentIndex]) {

    if (userClickedPattern.length === gamePattern.length) {
      setTimeout(nextSequence, 1000);
    }

  } else {
    gameOver();
  }
}

// GAME OVER
function gameOver() {

  playSound("wrong");

  document.body.classList.add("game-over");

  setTimeout(() => {
    document.body.classList.remove("game-over");
  }, 200);

  if (score > highScore) {
    highScore = score;
    document.getElementById("high-score").innerText =
      "High Score: " + highScore;
  }

  setTimeout(() => {
    resetGame(); // 🔥 delay so sound finishes
  }, 300);
}

// RESET
function resetGame() {
  gamePattern = [];
  userClickedPattern = [];
  started = false;
  level = 0;
  score = 0;

   clearInterval(timerId);

  document.getElementById("timer").innerText = "Time: 0";
  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("level-title").innerText = "Press Start";

 
}

// SOUND ENGINE
function playTone(freq) {
  let oscillator = audioContext.createOscillator();
  let gainNode = audioContext.createGain();

  oscillator.connect(gainNode);
  gainNode.connect(audioContext.destination);

  oscillator.frequency.value = freq;
  oscillator.type = "square";

  gainNode.gain.setValueAtTime(0.6, audioContext.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(
    0.0001,
    audioContext.currentTime + 0.4
  );

  oscillator.start();
  oscillator.stop(audioContext.currentTime + 0.4);
}

// SOUND MAP
function playSound(color) {
  switch (color) {
    case "box1":
      playTone(261.6);
      break;
    case "box2":
      playTone(329.6);
      break;
    case "box3":
      playTone(392.0);
      break;
    case "box4":
      playTone(523.3);
      break;
    case "wrong":
      playTone(100);
      break;
  }
}
</script>

</body>
</html>
